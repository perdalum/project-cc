name: ProjectCommandAndControl

options:
  bundleIdPrefix: dk.chc
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    PRODUCT_BUNDLE_IDENTIFIER: dk.chc.ProjectCommandAndControl
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "3"
    INFOPLIST_FILE: ProjectCommandAndControl/Info.plist

targets:
  ProjectCommandAndControl:
    type: application
    platform: macOS
    sources:
      - path: Sources/ProjectCommandAndControl
        name: ProjectCommandAndControl
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES

  ProjectCommandAndControlTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ProjectCommandAndControlTests
        name: ProjectCommandAndControlTests
    dependencies:
      - target: ProjectCommandAndControl
    settings:
      base:
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES

schemes:
  ProjectCommandAndControl:
    build:
      targets:
        ProjectCommandAndControl: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: ProjectCommandAndControlTests
          parallelizable: true
    archive:
      config: Release
